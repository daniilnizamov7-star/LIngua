<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bg" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0c0e14"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>
  <rect width="192" height="192" rx="38" fill="none" stroke="#2a3a5a" stroke-width="1.5"/>
  <!-- Book icon -->
  <rect x="42" y="52" width="50" height="66" rx="5" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.9"/>
  <rect x="100" y="52" width="50" height="66" rx="5" fill="none" stroke="#d4a843" stroke-width="2.5" opacity="0.9"/>
  <!-- Pages lines left book -->
  <line x1="52" y1="68" x2="82" y2="68" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
  <line x1="52" y1="76" x2="82" y2="76" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
  <line x1="52" y1="84" x2="82" y2="84" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
  <line x1="52" y1="92" x2="72" y2="92" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
  <!-- Pages lines right book -->
  <line x1="110" y1="68" x2="140" y2="68" stroke="#d4a843" stroke-width="1.5" opacity="0.5"/>
  <line x1="110" y1="76" x2="140" y2="76" stroke="#d4a843" stroke-width="1.5" opacity="0.5"/>
  <line x1="110" y1="84" x2="140" y2="84" stroke="#d4a843" stroke-width="1.5" opacity="0.5"/>
  <line x1="110" y1="92" x2="130" y2="92" stroke="#d4a843" stroke-width="1.5" opacity="0.5"/>
  <!-- Spine line -->
  <line x1="96" y1="52" x2="96" y2="118" stroke="#4a5a7a" stroke-width="2"/>
  <!-- Stars/progress dots -->
  <circle cx="62" cy="136" r="5" fill="#3b82f6" opacity="0.9"/>
  <circle cx="78" cy="136" r="5" fill="#3b82f6" opacity="0.7"/>
  <circle cx="94" cy="136" r="5" fill="#d4a843" opacity="0.9"/>
  <circle cx="110" cy="136" r="5" fill="#6b7d9e" opacity="0.4"/>
  <circle cx="126" cy="136" r="5" fill="#6b7d9e" opacity="0.3"/>
  <!-- App name -->
  <text x="96" y="158" font-family="Georgia,serif" font-size="13" font-weight="600" fill="#7a8dae" text-anchor="middle" letter-spacing="2">LINGUA</text>
</svg>