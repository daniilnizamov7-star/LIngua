<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a2240"/>
      <stop offset="100%" stop-color="#0c0e14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d4a843" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="192" height="192" rx="38" fill="none" stroke="#d4a843" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- Glow behind text -->
  <ellipse cx="96" cy="88" rx="70" ry="55" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Decorative top arc -->
  <path d="M 44 52 Q 96 32 148 52" stroke="#d4a843" stroke-opacity="0.25" stroke-width="1" fill="none"/>

  <!-- Arabic text قرآني -->
  <text
    x="96"
    y="112"
    font-family="Scheherazade New, Amiri, serif"
    font-size="64"
    fill="#f0c46a"
    text-anchor="middle"
    direction="rtl"
    unicode-bidi="bidi-override"
  >قرآني</text>

  <!-- Subtitle -->
  <text
    x="96"
    y="142"
    font-family="DM Sans, sans-serif"
    font-size="13"
    font-weight="500"
    fill="#7a859e"
    text-anchor="middle"
    letter-spacing="2"
  >ПУТЬ К КОРАНУ</text>

  <!-- Bottom decorative line -->
  <line x1="56" y1="152" x2="136" y2="152" stroke="#d4a843" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Corner dots -->
  <circle cx="56" cy="152" r="2" fill="#d4a843" fill-opacity="0.35"/>
  <circle cx="136" cy="152" r="2" fill="#d4a843" fill-opacity="0.35"/>
  <circle cx="96" cy="152" r="1.5" fill="#d4a843" fill-opacity="0.2"/>
</svg>