<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#bfe3f5"/>
    </radialGradient>
    
    <linearGradient id="bookGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f4e4a3"/>
      <stop offset="50%" style="stop-color:#e6c878"/>
      <stop offset="100%" style="stop-color:#d4a843"/>
    </linearGradient>
    
    <linearGradient id="pageLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9e8"/>
      <stop offset="100%" style="stop-color:#f0e0b0"/>
    </linearGradient>
    
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a843"/>
      <stop offset="100%" style="stop-color:#b8962e"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Фон -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>
  
  <!-- Точки по кругу -->
  <g fill="#c9a843" opacity="0.6">
    <circle cx="256" cy="80" r="3"/>
    <circle cx="288" cy="84" r="3"/>
    <circle cx="318" cy="95" r="3"/>
    <circle cx="345" cy="112" r="3"/>
    <circle cx="368" cy="135" r="3"/>
    <circle cx="386" cy="162" r="3"/>
    <circle cx="398" cy="192" r="3"/>
    <circle cx="404" cy="224" r="3"/>
    <circle cx="404" cy="256" r="3"/>
    <circle cx="398" cy="288" r="3"/>
    <circle cx="386" cy="318" r="3"/>
    <circle cx="368" cy="345" r="3"/>
    <circle cx="345" cy="368" r="3"/>    <circle cx="318" cy="386" r="3"/>
    <circle cx="288" cy="398" r="3"/>
    <circle cx="256" cy="404" r="3"/>
    <circle cx="224" cy="398" r="3"/>
    <circle cx="194" cy="386" r="3"/>
    <circle cx="167" cy="368" r="3"/>
    <circle cx="144" cy="345" r="3"/>
    <circle cx="127" cy="318" r="3"/>
    <circle cx="115" cy="288" r="3"/>
    <circle cx="109" cy="256" r="3"/>
    <circle cx="109" cy="224" r="3"/>
    <circle cx="115" cy="194" r="3"/>
    <circle cx="127" cy="167" r="3"/>
    <circle cx="144" cy="144" r="3"/>
    <circle cx="167" cy="127" r="3"/>
    <circle cx="194" cy="115" r="3"/>
    <circle cx="224" cy="109" r="3"/>
  </g>
  
  <!-- Геометрический узор -->
  <g fill="none" stroke="url(#goldLine)" stroke-width="1" opacity="0.5">
    <circle cx="256" cy="256" r="150"/>
    <circle cx="256" cy="256" r="130"/>
    <circle cx="256" cy="256" r="110"/>
    <ellipse cx="256" cy="256" rx="150" ry="65" transform="rotate(0 256 256)"/>
    <ellipse cx="256" cy="256" rx="150" ry="65" transform="rotate(45 256 256)"/>
    <ellipse cx="256" cy="256" rx="150" ry="65" transform="rotate(90 256 256)"/>
    <ellipse cx="256" cy="256" rx="150" ry="65" transform="rotate(135 256 256)"/>
  </g>
  
  <!-- Лучи света -->
  <g stroke="#f4e4a3" stroke-width="3" opacity="0.5" filter="url(#glow)" stroke-linecap="round">
    <line x1="256" y1="256" x2="256" y2="165"/>
    <line x1="256" y1="256" x2="232" y2="170"/>
    <line x1="256" y1="256" x2="280" y2="170"/>
    <line x1="256" y1="256" x2="210" y2="180"/>
    <line x1="256" y1="256" x2="302" y2="180"/>
    <line x1="256" y1="256" x2="190" y2="195"/>
    <line x1="256" y1="256" x2="322" y2="195"/>
    <line x1="256" y1="256" x2="175" y2="215"/>
    <line x1="256" y1="256" x2="337" y2="215"/>
  </g>
  
  <!-- Свечение -->
  <ellipse cx="256" cy="265" rx="100" ry="75" fill="#f4e4a3" opacity="0.25" filter="url(#glow)"/>
  
  <!-- 3D Книга -->
  <g transform="translate(256,285)">
    <!-- Тень -->
    <ellipse cx="0" cy="50" rx="95" ry="12" fill="#000" opacity="0.12"/>    
    <!-- Левая обложка -->
    <path d="M-90,15 Q-90,-40 0,-40 L0,45 L-90,45 Z" fill="#c9a86c"/>
    
    <!-- Правая обложка -->
    <path d="M90,15 Q90,-40 0,-40 L0,45 L90,45 Z" fill="#b8962e"/>
    
    <!-- Левые страницы -->
    <path d="M-85,12 Q-85,-35 0,-35 L0,42 L-85,42 Z" fill="url(#pageLight)"/>
    <path d="M-80,8 Q-80,-30 -5,-30 L-5,38 L-80,38 Z" fill="#fff9e8"/>
    <path d="M-75,5 Q-75,-25 -10,-25 L-10,35 L-75,35 Z" fill="#f8e8c8"/>
    
    <!-- Правые страницы -->
    <path d="M85,12 Q85,-35 0,-35 L0,42 L85,42 Z" fill="url(#pageLight)"/>
    <path d="M80,8 Q80,-30 5,-30 L5,38 L80,38 Z" fill="#fff9e8"/>
    <path d="M75,5 Q75,-25 10,-25 L10,35 L75,35 Z" fill="#f8e8c8"/>
    
    <!-- Центральная линия -->
    <path d="M0,-40 Q-2,0 0,45" fill="none" stroke="#d4a843" stroke-width="2.5"/>
    
    <!-- Загнутые страницы слева -->
    <path d="M-80,-28 Q-45,-35 0,-32 Q-40,-28 -75,-25 Z" fill="#f0e0b0"/>
    
    <!-- Загнутые страницы справа -->
    <path d="M80,-28 Q45,-35 0,-32 Q40,-28 75,-25 Z" fill="#f0e0b0"/>
    
    <!-- Детали страниц -->
    <line x1="-70" y1="-18" x2="-20" y2="-20" stroke="#e0d0a8" stroke-width="0.8" opacity="0.4"/>
    <line x1="-70" y1="-8" x2="-20" y2="-10" stroke="#e0d0a8" stroke-width="0.8" opacity="0.4"/>
    <line x1="-70" y1="2" x2="-20" y2="0" stroke="#e0d0a8" stroke-width="0.8" opacity="0.4"/>
    <line x1="70" y1="-18" x2="20" y2="-20" stroke="#e0d0a8" stroke-width="0.8" opacity="0.4"/>
    <line x1="70" y1="-8" x2="20" y2="-10" stroke="#e0d0a8" stroke-width="0.8" opacity="0.4"/>
    <line x1="70" y1="2" x2="20" y2="0" stroke="#e0d0a8" stroke-width="0.8" opacity="0.4"/>
  </g>
</svg>