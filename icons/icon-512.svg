<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Фон градиент -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#d4e8f5"/>
    </radialGradient>
    
    <!-- Золотой градиент для книги -->
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4d4a3"/>
      <stop offset="50%" style="stop-color:#e8c08e"/>
      <stop offset="100%" style="stop-color:#d4a843"/>
    </linearGradient>
    
    <!-- Градиент для страниц -->
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f9e8c8"/>
      <stop offset="100%" style="stop-color:#e8d4a8"/>
    </linearGradient>
    
    <!-- Золотой для линий -->
    <linearGradient id="goldLineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a843"/>
      <stop offset="100%" style="stop-color:#b8962e"/>
    </linearGradient>
    
    <!-- Свечение для лучей -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Фон -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>
  
  <!-- Внешний круг точек -->
  <g fill="#d4a843" opacity="0.8">
    <circle cx="256" cy="72" r="2.5"/>
    <circle cx="274" cy="73" r="2.5"/>
    <circle cx="292" cy="77" r="2.5"/>
    <circle cx="309" cy="84" r="2.5"/>
    <circle cx="325" cy="93" r="2.5"/>
    <circle cx="340" cy="105" r="2.5"/>
    <circle cx="353" cy="119" r="2.5"/>
    <circle cx="364" cy="135" r="2.5"/>    <circle cx="373" cy="152" r="2.5"/>
    <circle cx="379" cy="170" r="2.5"/>
    <circle cx="383" cy="189" r="2.5"/>
    <circle cx="384" cy="208" r="2.5"/>
    <circle cx="383" cy="227" r="2.5"/>
    <circle cx="379" cy="246" r="2.5"/>
    <circle cx="373" cy="264" r="2.5"/>
    <circle cx="364" cy="281" r="2.5"/>
    <circle cx="353" cy="297" r="2.5"/>
    <circle cx="340" cy="311" r="2.5"/>
    <circle cx="325" cy="323" r="2.5"/>
    <circle cx="309" cy="332" r="2.5"/>
    <circle cx="292" cy="339" r="2.5"/>
    <circle cx="274" cy="343" r="2.5"/>
    <circle cx="256" cy="344" r="2.5"/>
    <circle cx="238" cy="343" r="2.5"/>
    <circle cx="220" cy="339" r="2.5"/>
    <circle cx="203" cy="332" r="2.5"/>
    <circle cx="187" cy="323" r="2.5"/>
    <circle cx="172" cy="311" r="2.5"/>
    <circle cx="159" cy="297" r="2.5"/>
    <circle cx="148" cy="281" r="2.5"/>
    <circle cx="139" cy="264" r="2.5"/>
    <circle cx="133" cy="246" r="2.5"/>
    <circle cx="129" cy="227" r="2.5"/>
    <circle cx="128" cy="208" r="2.5"/>
    <circle cx="129" cy="189" r="2.5"/>
    <circle cx="133" cy="170" r="2.5"/>
    <circle cx="139" cy="152" r="2.5"/>
    <circle cx="148" cy="135" r="2.5"/>
    <circle cx="159" cy="119" r="2.5"/>
    <circle cx="172" cy="105" r="2.5"/>
    <circle cx="187" cy="93" r="2.5"/>
    <circle cx="203" cy="84" r="2.5"/>
    <circle cx="220" cy="77" r="2.5"/>
    <circle cx="238" cy="73" r="2.5"/>
  </g>
  
  <!-- Геометрический узор из пересекающихся кругов -->
  <g fill="none" stroke="url(#goldLineGrad)" stroke-width="1.2" opacity="0.7">
    <circle cx="256" cy="256" r="140"/>
    <circle cx="256" cy="256" r="120"/>
    <circle cx="256" cy="256" r="100"/>
    <!-- Пересекающиеся круги для создания звёздного паттерна -->
    <ellipse cx="256" cy="256" rx="140" ry="60" transform="rotate(0 256 256)"/>
    <ellipse cx="256" cy="256" rx="140" ry="60" transform="rotate(45 256 256)"/>
    <ellipse cx="256" cy="256" rx="140" ry="60" transform="rotate(90 256 256)"/>
    <ellipse cx="256" cy="256" rx="140" ry="60" transform="rotate(135 256 256)"/>
  </g>
    <!-- Лучи света от книги -->
  <g stroke="#f4d4a3" stroke-width="2" opacity="0.6" filter="url(#glow)">
    <line x1="256" y1="256" x2="256" y2="180"/>
    <line x1="256" y1="256" x2="235" y2="185"/>
    <line x1="256" y1="256" x2="277" y2="185"/>
    <line x1="256" y1="256" x2="215" y2="195"/>
    <line x1="256" y1="256" x2="297" y2="195"/>
    <line x1="256" y1="256" x2="195" y2="210"/>
    <line x1="256" y1="256" x2="317" y2="210"/>
    <line x1="256" y1="256" x2="180" y2="230"/>
    <line x1="256" y1="256" x2="332" y2="230"/>
  </g>
  
  <!-- Свечение за книгой -->
  <ellipse cx="256" cy="270" rx="90" ry="70" fill="#f4d4a3" opacity="0.2" filter="url(#glow)"/>
  
  <!-- 3D Открытая книга -->
  <g transform="translate(256,280)">
    <!-- Тень под книгой -->
    <ellipse cx="0" cy="45" rx="85" ry="12" fill="#000" opacity="0.15"/>
    
    <!-- Левая сторона книги (обложка снизу) -->
    <path d="M-85,10 Q-85,-35 0,-35 L0,40 L-85,40 Z" fill="#c9a86c"/>
    
    <!-- Правая сторона книги (обложка снизу) -->
    <path d="M85,10 Q85,-35 0,-35 L0,40 L85,40 Z" fill="#b8962e"/>
    
    <!-- Левые страницы -->
    <path d="M-80,8 Q-80,-30 0,-30 L0,35 L-80,35 Z" fill="url(#pageGrad)"/>
    <path d="M-75,5 Q-75,-25 -5,-25 L-5,32 L-75,32 Z" fill="#f9e8c8"/>
    <path d="M-70,3 Q-70,-20 -10,-20 L-10,30 L-70,30 Z" fill="#f4e4c0"/>
    
    <!-- Правые страницы -->
    <path d="M80,8 Q80,-30 0,-30 L0,35 L80,35 Z" fill="url(#pageGrad)"/>
    <path d="M75,5 Q75,-25 5,-25 L5,32 L75,32 Z" fill="#f9e8c8"/>
    <path d="M70,3 Q70,-20 10,-20 L10,30 L70,30 Z" fill="#f4e4c0"/>
    
    <!-- Центральная линия переплёта -->
    <path d="M0,-35 Q-2,0 0,40" fill="none" stroke="#d4a843" stroke-width="2"/>
    
    <!-- Верхняя часть левой страницы (загнутая) -->
    <path d="M-75,-28 Q-40,-32 0,-30 Q-35,-25 -70,-25 Z" fill="#e8d4a8"/>
    
    <!-- Верхняя часть правой страницы (загнутая) -->
    <path d="M75,-28 Q40,-32 0,-30 Q35,-25 70,-25 Z" fill="#e8d4a8"/>
    
    <!-- Детали страниц -->
    <line x1="-65" y1="-15" x2="-15" y2="-18" stroke="#d4c4a0" stroke-width="0.5" opacity="0.5"/>
    <line x1="-65" y1="-5" x2="-15" y2="-8" stroke="#d4c4a0" stroke-width="0.5" opacity="0.5"/>
    <line x1="65" y1="-15" x2="15" y2="-18" stroke="#d4c4a0" stroke-width="0.5" opacity="0.5"/>    <line x1="65" y1="-5" x2="15" y2="-8" stroke="#d4c4a0" stroke-width="0.5" opacity="0.5"/>
  </g>
</svg>