<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a2240"/>
      <stop offset="100%" stop-color="#0c0e14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#d4a843" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3dba7e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#3dba7e" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Border -->
  <rect width="512" height="512" rx="100" fill="none" stroke="#d4a843" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Glow layers -->
  <ellipse cx="256" cy="210" rx="200" ry="155" fill="url(#glow)" filter="url(#blur)"/>
  <ellipse cx="256" cy="300" rx="160" ry="100" fill="url(#glow2)" filter="url(#blur2)"/>

  <!-- Top decorative arc -->
  <path d="M 100 130 Q 256 82 412 130" stroke="#d4a843" stroke-opacity="0.2" stroke-width="1.5" fill="none"/>
  <path d="M 120 120 Q 256 76 392 120" stroke="#d4a843" stroke-opacity="0.08" stroke-width="1" fill="none"/>

  <!-- Star/geometric ornament top center -->
  <g transform="translate(256, 100)" opacity="0.4">
    <circle cx="0" cy="0" r="3" fill="#d4a843"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#d4a843" stroke-width="0.8" stroke-opacity="0.5"/>
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#d4a843" stroke-width="0.8" stroke-opacity="0.5"/>
    <line x1="-13" y1="-13" x2="13" y2="13" stroke="#d4a843" stroke-width="0.6" stroke-opacity="0.3"/>
    <line x1="13" y1="-13" x2="-13" y2="13" stroke="#d4a843" stroke-width="0.6" stroke-opacity="0.3"/>
  </g>

  <!-- Main Arabic text قرآني -->
  <text
    x="256"
    y="310"
    font-family="Scheherazade New, Amiri, serif"
    font-size="172"
    fill="#f0c46a"
    text-anchor="middle"
    direction="rtl"
    unicode-bidi="bidi-override"
  >قرآني</text>

  <!-- Subtitle -->
  <text
    x="256"
    y="370"
    font-family="DM Sans, sans-serif"
    font-size="32"
    font-weight="500"
    fill="#7a859e"
    text-anchor="middle"
    letter-spacing="6"
  >ПУТЬ К КОРАНУ</text>

  <!-- Decorative bottom line with dots -->
  <line x1="140" y1="400" x2="372" y2="400" stroke="#d4a843" stroke-opacity="0.18" stroke-width="1"/>
  <circle cx="140" cy="400" r="3.5" fill="#d4a843" fill-opacity="0.3"/>
  <circle cx="372" cy="400" r="3.5" fill="#d4a843" fill-opacity="0.3"/>
  <circle cx="256" cy="400" r="2.5" fill="#d4a843" fill-opacity="0.18"/>
  <circle cx="198" cy="400" r="1.5" fill="#d4a843" fill-opacity="0.12"/>
  <circle cx="314" cy="400" r="1.5" fill="#d4a843" fill-opacity="0.12"/>

  <!-- Bottom ornamental arc -->
  <path d="M 140 415 Q 256 430 372 415" stroke="#d4a843" stroke-opacity="0.1" stroke-width="1" fill="none"/>

  <!-- Corner ornaments -->
  <g opacity="0.15" stroke="#d4a843" stroke-width="1.5" fill="none">
    <path d="M 60 60 L 60 90 Q 60 100 70 100 L 100 100"/>
    <path d="M 452 60 L 452 90 Q 452 100 442 100 L 412 100"/>
    <path d="M 60 452 L 60 422 Q 60 412 70 412 L 100 412"/>
    <path d="M 452 452 L 452 422 Q 452 412 442 412 L 412 412"/>
  </g>
</svg>