<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Араб • SRS</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#0b1220;--card:#151e2e;--text:#f1f5f9;--text2:#94a3b8;--accent:#38bdf8;--ok:#34d399;--warn:#fbbf24;--err:#f87171;--border:#2a364a;--radius:18px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{height:100vh;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;padding:16px}
header{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
h1{font-size:16px;font-weight:700;color:var(--accent)}
.meta-row{display:flex;gap:8px;align-items:center}
.version{font-size:11px;color:var(--text2);background:var(--card);padding:3px 8px;border-radius:12px;border:1px solid var(--border)}
.session-count{font-size:13px;color:var(--text2);background:var(--card);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.card{width:100%;max-width:380px;aspect-ratio:4/3;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none;transition:transform .15s,box-shadow .2s;box-shadow:0 6px 24px rgba(0,0,0,.4);position:relative;overflow:hidden}
.card:active{transform:scale(.98)}
.ar-word{font-size:46px;direction:rtl;font-weight:700;text-align:center;line-height:1.2;margin-bottom:8px}
.context{font-size:15px;color:var(--text2);text-align:center;padding:0 16px;margin-top:8px;opacity:.85}
.hint{position:absolute;bottom:16px;font-size:13px;color:var(--text2);opacity:.7}
.back{display:none;flex-direction:column;align-items:center;gap:10px;padding:20px;width:100%;height:100%;justify-content:center;background:var(--card)}
.translit{font-size:22px;font-weight:700;color:var(--accent)}
.trans{font-size:16px;color:var(--text2)}
.root{font-size:13px;color:var(--warn);margin-top:6px;padding:4px 12px;background:rgba(251,191,36,.1);border-radius:20px}
.audio-btn{background:none;border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;margin-top:8px}
.audio-btn:active{transform:scale(.95)}
.controls{display:none;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;max-width:380px;margin-top:8px}
.controls.active{display:grid} /* 🔥 ИСПРАВЛЕНО */
.btn{padding:14px 6px;border:none;border-radius:14px;font-weight:700;font-size:14px;cursor:pointer;transition:transform .1s;color:#0b1220}
.btn:active{transform:scale(.95)}
.b0{background:var(--err)}.b1{background:var(--warn)}.b2{background:var(--ok)}.b3{background:var(--accent)}
.footer{display:flex;justify-content:space-between;align-items:center;padding:10px 0;font-size:12px;color:var(--text2)}
.streak{display:flex;gap:6px;align-items:center;background:var(--card);padding:6px 12px;border-radius:20px;border:1px solid var(--border)}
.reset{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer}
#updateBanner{display:none;position:fixed;top:0;left:0;right:0;background:var(--warn);color:#0b1220;text-align:center;padding:14px 16px;font-size:14px;font-weight:700;z-index:9999;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4);align-items:center;justify-content:center;gap:12px}
#updateBanner:hover{background:#f59e0b}
@keyframes slide{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.show{animation:slide .25s ease both}
</style>
</head>
<body>
<div id="updateBanner" onclick="forceUpdate()">🔄 Доступна новая версия. Нажмите для обновления.</div>

<header>
  <h1>📖 Араб • Корень</h1>  <div class="meta-row">
    <span class="version" id="appVersion">v2.0</span>
    <span class="session-count" id="session">0 / 0</span>
  </div>
</header>

<main>
  <div class="card" id="card" onclick="flip()">
    <div class="ar-word" id="ar">كِتَاب</div>
    <div class="context" id="ctx">ذَٰلِكَ الْكِتَابُ...</div>
    <div class="hint" id="hint">Нажми для перевода</div>
    <div class="back" id="back">
      <button class="audio-btn" onclick="speak(event)">🔊</button>
      <div class="translit" id="tl">кита́б</div>
      <div class="trans" id="tr">книга</div>
      <div class="root" id="rt">🌳 ك-ت-ب • فِعَال</div>
    </div>
  </div>

  <div class="controls" id="ctrl">
    <button class="btn b0" onclick="grade(0)">😕 Забыл</button>
    <button class="btn b1" onclick="grade(1)">🤔 Трудно</button>
    <button class="btn b2" onclick="grade(2)">✅ Норма</button>
    <button class="btn b3" onclick="grade(3)">🚀 Легко</button>
  </div>
</main>

<div class="footer">
  <div class="streak">🔥 <span id="streak">0</span> дн</div>
  <button class="reset" onclick="resetAll()" title="Сбросить прогресс">↺</button>
</div>

<script>
const APP_VERSION = 'v2.0';
document.getElementById('appVersion').textContent = APP_VERSION;

const WORDS=[
  {id:"w1",ar:"كِتَاب",rt:"ك-ت-ب",p:"فِعَال",tl:"кита́б",tr:"книга, писание",ctx:"ذَٰلِكَ الْكِتَابُ لَا رَيْبَ ۛ فِيهِ"},
  {id:"w2",ar:"عِلْم",rt:"ع-ل-م",p:"فِعْل",tl:"и́льм",tr:"знание",ctx:"اقْرَأْ بِاسْمِ رَبِّكَ الَّذِي خَلَقَ"},
  {id:"w3",ar:"رَحْمَة",rt:"ر-ح-م",p:"فَعْلَة",tl:"ра́хма",tr:"милость",ctx:"رَحْمَةً لِّلْعَالَمِينَ"},
  {id:"w4",ar:"يَوْم",rt:"ي-و-م",p:"فَعْل",tl:"я́ум",tr:"день",ctx:"يَوْمَ الدِّينِ"},
  {id:"w5",ar:"أَرْض",rt:"أ-ر-ض",p:"فَعْل",tl:"ард",tr:"земля",ctx:"خَلَقَ السَّمَاوَاتِ وَالْأَرْضَ"},
  {id:"w6",ar:"سَمَاء",rt:"س-м-و",p:"فَعَال",tl:"са́ма'",tr:"небо",ctx:"رَبُّ السَّمَاوَاتِ وَالْأَرْضِ"},
  {id:"w7",ar:"نُور",rt:"н-و-р",p:"فُعُول",tl:"ну́р",tr:"свет",ctx:"نُورٌ عَلَىٰ نُورٍ"},
  {id:"w8",ar:"هُدًى",rt:"ه-д-и",p:"فُعَال",tl:"худа́",tr:"руководство",ctx:"هُدًى لِّلنَّاسِ"},
  {id:"w9",ar:"رَسُول",rt:"р-с-л",p:"فَعُول",tl:"расу́ль",tr:"посланник",ctx:"رَسُولٌ مِّنَ اللَّهِ"},
  {id:"w10",ar:"نَبِيّ",rt:"н-б-أ",p:"فَعِيل",tl:"наби́",tr:"пророк",ctx:"نَبِيًّا مُّصْطَفًى"},
  {id:"w11",ar:"قَوْم",rt:"q-в-м",p:"فَعْل",tl:"ка́ум",tr:"народ, община",ctx:"قَوْمِ نُوحٍ"},
  {id:"w12",ar:"أُمَّة",rt:"أ-м-м",p:"فُعْلَة",tl:"у́мма",tr:"община, нация",ctx:"أُمَّةً وَاحِدَةً"},
  {id:"w13",ar:"حَقّ",rt:"х-q-q",p:"فَعْل",tl:"хакк",tr:"истина, должное",ctx:"بِالْحَقِّ خَلَقَهُمَا"},  {id:"w14",ar:"بَاطِل",rt:"б-т-л",p:"فَاعِل",tl:"ба́тиль",tr:"ложь, тщета",ctx:"لَا بَاطِلًا"},
  {id:"w15",ar:"صَبْر",rt:"с-б-р",p:"فَعْل",tl:"сабр",tr:"терпение",ctx:"إِنَّ اللَّهَ مَعَ الصَّابِرِينَ"},
  {id:"w16",ar:"شُكْر",rt:"ш-к-р",p:"فُعْل",tl:"шукр",tr:"благодарность",ctx:"لَئِن شَكَرْتُمْ"},
  {id:"w17",ar:"تَقْوَىٰ",rt:"в-q-и",p:"تَفْعِيل",tl:"таква́",tr:"богобоязненность",ctx:"وَتَعَاوَنُوا عَلَى الْبِرِّ وَالتَّقْوَىٰ"},
  {id:"w18",ar:"إِيمَان",rt:"أ-м-н",p:"إِفْعَال",tl:"и́ман",tr:"вера",ctx:"آمَنَ الرَّسُولُ بِمَا أُنزِلَ إِلَيْهِ"},
  {id:"w19",ar:"خَيْر",rt:"х-и-р",p:"فَعْل",tl:"хайр",tr:"благо, добро",ctx:"وَمَا تَفْعَلُوا مِنْ خَيْرٍ يَعْلَمْهُ اللَّهُ"},
  {id:"w20",ar:"شَرّ",rt:"ш-р-р",p:"فَعْل",tl:"шарр",tr:"зло",ctx:"مِن شَرِّ مَا خَلَقَ"},
  {id:"w21",ar:"جَنَّة",rt:"дж-н-н",p:"فَعْلَة",tl:"джа́нна",tr:"рай, сад",ctx:"جَنَّاتٍ تَجْرِي مِن تَحْتِهَا الْأَنْهَارُ"},
  {id:"w22",ar:"نَار",rt:"н-в-р",p:"فَعَال",tl:"на́р",tr:"огонь",ctx:"وَقُودُهَا النَّاسُ وَالْحِجَارَةُ"},
  {id:"w23",ar:"مَاء",rt:"м-в-х",p:"فَعْل",tl:"ма'",tr:"вода",ctx:"وَجَعَلْنَا مِنَ الْمَاءِ كُلَّ شَيْءٍ حَيٍّ"},
  {id:"w24",ar:"شَجَر",rt:"ш-дж-р",p:"فَعَل",tl:"ша́джар",tr:"дерево",ctx:"شَجَرَةٍ طَيِّبَةٍ"},
  {id:"w25",ar:"جَبَل",rt:"дж-б-л",p:"فَعَل",tl:"джа́баль",tr:"гора",ctx:"وَالْجِبَالَ أَوْتَادًا"},
  {id:"w26",ar:"بَحْر",rt:"б-х-р",p:"فَعْل",tl:"бахр",tr:"море",ctx:"وَالْبَحْرِ الْمَسْجُورِ"},
  {id:"w27",ar:"شَمْس",rt:"ш-м-с",p:"فَعْل",tl:"шамс",tr:"солнце",ctx:"وَالشَّمْسِ وَضُحَاهَا"},
  {id:"w28",ar:"قَمَر",rt:"q-м-р",p:"فَعَل",tl:"ка́мар",tr:"луна",ctx:"وَالْقَمَرِ إِذَا تَلَاهَا"},
  {id:"w29",ar:"لَيْل",rt:"л-и-л",p:"فَعْل",tl:"ляйль",tr:"ночь",ctx:"وَاللَّيْلِ إِذَا يَغْشَىٰ"},
  {id:"w30",ar:"نَهَار",rt:"н-х-р",p:"فَعَال",tl:"наха́р",tr:"день, свет",ctx:"وَالنَّهَارِ إِذَا جَلَّاهَا"},
  {id:"w31",ar:"قَلْب",rt:"q-л-б",p:"فَعْل",tl:"кальб",tr:"сердце",ctx:"أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ"},
  {id:"w32",ar:"رُوح",rt:"р-в-х",p:"فُعُول",tl:"ру́х",tr:"дух",ctx:"وَنَفَخْنَا فِيهِ مِن رُّوحِنَا"},
  {id:"w33",ar:"حَيَاة",rt:"х-и-и",p:"فَعَالَة",tl:"хая́т",tr:"жизнь",ctx:"وَمَا الْحَيَاةُ الدُّنْيَا إِلَّا مَتَاعُ الْغُرُورِ"},
  {id:"w34",ar:"مَوْت",rt:"м-в-т",p:"فَعْل",tl:"маут",tr:"смерть",ctx:"كُلُّ نَفْسٍ ذَائِقَةُ الْمَوْتِ"},
  {id:"w35",ar:"بَاب",rt:"б-в-б",p:"فَعْل",tl:"баб",tr:"дверь, врата",ctx:"وَفُتِحَتِ الْأَبْوَابُ"},
  {id:"w36",ar:"بَيْت",rt:"б-и-т",p:"فَعْل",tl:"байт",tr:"дом",ctx:"وَاللَّهُ جَعَلَ لَكُم مِّن بُيُوتِكُمْ سَكَنًا"},
  {id:"w37",ar:"سَلَام",rt:"с-л-м",p:"فَعَال",tl:"саля́м",tr:"мир",ctx:"سَلَامٌ قَوْلًا مِّن رَّبٍّ رَّحِيمٍ"},
  {id:"w38",ar:"عَدْل",rt:"а-д-л",p:"فَعْل",tl:"адль",tr:"справедливость",ctx:"إِنَّ اللَّهَ يَأْمُرُ بِالْعَدْلِ"},
  {id:"w39",ar:"ظُلْم",rt:"з-л-м",p:"فُعْل",tl:"зульм",tr:"несправедливость",ctx:"وَلَا تَظْلِمُونَ"},
  {id:"w40",ar:"طَعَام",rt:"т-а-м",p:"فَعَال",tl:"та'а́м",tr:"пища",ctx:"وَيُطْعِمُونَ الطَّعَامَ عَلَىٰ حُبِّهِ"},
  {id:"w41",ar:"سَمْع",rt:"с-м-а",p:"فَعْل",tl:"самъ",tr:"слух",ctx:"وَإِنَّ السَّمْعَ وَالْبَصَرَ"},
  {id:"w42",ar:"بَصَر",rt:"б-с-р",p:"فَعَل",tl:"ба́сар",tr:"зрение",ctx:"وَالْبَصَرَ وَالْفُؤَادَ"},
  {id:"w43",ar:"فُؤَاد",rt:"ф-أ-د",p:"فُعَال",tl:"фу'а́д",tr:"сердце (внутреннее)",ctx:"مَا كَذَبَ الْفُؤَادُ مَا رَأَىٰ"},
  {id:"w44",ar:"رَحْمَٰن",rt:"р-х-м",p:"فَعْلَان",tl:"рахма́н",tr:"Милостивый",ctx:"الرَّحْمَٰنِ الرَّحِيمِ"},
  {id:"w45",ar:"رَبّ",rt:"р-б-б",p:"فَعْل",tl:"рабб",tr:"Господь",ctx:"رَبِّ اشْرَحْ لِي صَدْرِي"},
  {id:"w46",ar:"دُعَاء",rt:"д-а-в",p:"فُعَال",tl:"ду'а́",tr:"мольба",ctx:"ادْعُونِي أَسْتَجِبْ لَكُمْ"},
  {id:"w47",ar:"صَلَاة",rt:"с-л-в",p:"فَعَالَة",tl:"саля́т",tr:"намаз, молитва",ctx:"إِنَّ الصَّلَاةَ تَنْهَىٰ عَنِ الْفَحْشَاءِ"},
  {id:"w48",ar:"زَكَاة",rt:"з-к-в",p:"فَعَالَة",tl:"зака́т",tr:"очистительный налог",ctx:"وَآتُوا الزَّكَاةَ"},
  {id:"w49",ar:"صِيَام",rt:"с-в-м",p:"فِعَال",tl:"сыя́м",tr:"саум",ctx:"كُتِبَ عَلَيْكُمُ الصِّيَامُ"},
  {id:"w50",ar:"حَجّ",rt:"х-дж-дж",p:"فَعْل",tl:"хадж",tr:"паломничество",ctx:"وَلِلَّهِ عَلَى النَّاسِ حِجُّ الْبَيْتِ"}
];

const DB_NAME='arab_srs'; const STORE='progress'; let db, sessionQueue=[], idx=0, streak=0;
const openDB = () => new Promise(r=>{const o=indexedDB.open(DB_NAME,1);o.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE,{keyPath:'id'});};o.onsuccess=e=>{db=e.target.result;r(db);};});
const getProg = id => new Promise(r=>{const tx=db.transaction(STORE,'readonly');const req=tx.objectStore(STORE).get(id);req.onsuccess=()=>r(req.result||{id,srs:{interval:0,rep:0,ease:2.5,lapses:0,next:Date.now()}});});
const saveProg = p => new Promise(r=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(p);tx.oncomplete=()=>r();});

function calcSRS(card, q) {
  let { interval=0, rep=0, ease=2.5, lapses=0 } = card.srs || {};
  if (q===0) { interval=0; rep=0; ease=Math.max(1.3,ease-0.2); lapses++; }
  else {
    if(rep===0) interval=1; else if(rep===1) interval=3; else interval=Math.round(interval*ease);
    rep++; ease += (q===1?0.05:q===2?0.1:0.15) - (3-q)*0.05; ease=Math.min(3,Math.max(1.3,ease));  }
  const now = Date.now();
  card.srs = {interval, rep, ease, lapses, next: now + (interval===0?0:interval*86400000)};
  return card;
}

const $=id=>document.getElementById(id);
async function init() {
  await openDB();
  streak = parseInt(localStorage.getItem('ar_streak')||'0');
  const last = parseInt(localStorage.getItem('ar_last')||'0');
  const today = Date.now();
  if (last && today - last > 172800000) streak=0;
  if (!last || today - last > 86400000) localStorage.setItem('ar_last', today);
  $('streak').textContent = streak;

  const now = Date.now();
  for(const w of WORDS){
    const p = await getProg(w.id);
    sessionQueue.push({...w, srs: p.srs || {interval:0,rep:0,ease:2.5,lapses:0,next:now}});
  }
  idx=0; render();
}

function render() {
  if(idx>=sessionQueue.length) {
    $('ar').textContent='🎉'; $('ctx').textContent='Сессия завершена! Закрой и открой завтра.'; $('hint').textContent=''; $('back').style.display='none'; $('ctrl').classList.remove('active'); $('session').textContent=`${idx}/${idx}`;
    if(streak===0 || Date.now()-parseInt(localStorage.getItem('ar_last')||'0')>86400000) { streak++; localStorage.setItem('ar_streak',streak); $('streak').textContent=streak; }
    return;
  }
  const w = sessionQueue[idx];
  $('ar').textContent = w.ar; $('ctx').textContent = w.ctx; $('tl').textContent = w.tl; $('tr').textContent = w.tr; $('rt').textContent = `🌳 ${w.rt} • ${w.p}`;
  $('hint').textContent = 'Нажми для перевода'; $('back').style.display='none'; $('ctrl').classList.remove('active'); $('card').classList.add('show');
  $('session').textContent = `${idx+1} / ${sessionQueue.length}`;
}

function flip() {
  if($('back').style.display!=='none') return;
  $('hint').style.display='none'; $('back').style.display='flex'; $('ctrl').classList.add('active');
}

async function grade(q) {
  const w = sessionQueue[idx];
  const updated = calcSRS({...w, srs:w.srs}, q);
  await saveProg(updated);
  if(q===0) sessionQueue.push(updated);
  idx++; render();
}

function speak(e) {  e.stopPropagation();
  if(!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(sessionQueue[idx].ar);
  u.lang='ar-SA'; u.rate=0.85; speechSynthesis.speak(u);
}

function resetAll() {
  if(!confirm('Сбросить весь прогресс и статистику?')) return;
  localStorage.clear();
  const tx = db.transaction(STORE,'readwrite');
  tx.objectStore(STORE).clear();
  tx.oncomplete = ()=>location.reload();
}

let refreshing = false;
function forceUpdate() {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => {
      if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
    });
  });
  $('updateBanner').style.display = 'none';
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          $('updateBanner').style.display = 'flex';
        }
      });
    });
  });

  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshing) return;
    refreshing = true;
    location.reload();
  });
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
