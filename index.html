<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e293b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Араб • Слова Корана</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#0f172a;--card:#1e293b;--text:#f8fafc;--text2:#94a3b8;--accent:#38bdf8;--success:#34d399;--border:#334155}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{height:100vh;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative}
.header{position:fixed;top:0;left:0;right:0;padding:20px 20px 10px;text-align:center;z-index:10;background:linear-gradient(to bottom,var(--bg) 80%,transparent)}
.title{font-size:18px;font-weight:800;color:var(--accent);letter-spacing:-.5px}
.progress-wrap{width:100%;max-width:360px;background:var(--card);border-radius:8px;padding:4px;margin-top:12px}
.progress-bar{height:6px;background:var(--accent);border-radius:4px;transition:width .3s ease}
.stats{display:flex;gap:12px;margin:30px 0 20px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 20px;text-align:center}
.stat-val{font-size:26px;font-weight:800;color:var(--success)}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}
.card{width:100%;max-width:360px;aspect-ratio:3/2;background:var(--card);border:1px solid var(--border);border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none;transition:transform .15s ease;box-shadow:0 8px 30px rgba(0,0,0,.3)}
.card:active{transform:scale(.97)}
.arabic-word{font-size:52px;direction:rtl;font-weight:700;color:var(--text);text-align:center;line-height:1.3}
.hint{color:var(--text2);font-size:14px;margin-top:18px;transition:opacity .2s}
.answer{display:none;margin-top:16px;text-align:center}
.translit{font-size:22px;color:var(--accent);font-weight:700;margin-bottom:4px}
.translation{font-size:18px;color:var(--text2)}
.buttons{display:none;gap:12px;margin-top:24px;width:100%;max-width:360px}
.buttons.active{display:flex}
.btn{flex:1;padding:14px;border:none;border-radius:14px;font-weight:700;font-size:15px;cursor:pointer;transition:transform .1s}
.btn:active{transform:scale(.96)}
.btn-fail{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-success{background:var(--success);color:#0f172a}
.footer{position:fixed;bottom:20px;left:0;right:0;text-align:center;font-size:12px;color:var(--text2)}
.reset-btn{position:fixed;top:20px;right:20px;background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:8px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="header">
  <div class="title">📖 Араб • Слова Корана</div>
  <div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>
</div>
<button class="reset-btn" onclick="resetApp()" title="Сбросить прогресс">↺</button>

<div class="stats">
  <div class="stat"><div class="stat-val" id="learned">0</div><div class="stat-label">Выучено</div></div>
  <div class="stat"><div class="stat-val" id="remaining">50</div><div class="stat-label">Осталось</div></div></div>

<div class="card" id="card" onclick="flip()">
  <div class="arabic-word" id="word">كتاب</div>
  <div class="hint" id="hint">Нажми, чтобы увидеть перевод</div>
  <div class="answer" id="answer">
    <div class="translit" id="translit">кита́б</div>
    <div class="translation" id="translation">книга</div>
  </div>
</div>

<div class="buttons" id="buttons">
  <button class="btn btn-fail" onclick="rate(false)">😕 Не знал</button>
  <button class="btn btn-success" onclick="rate(true)">✅ Знал</button>
</div>

<div class="footer">Данные сохраняются локально • Работает оффлайн</div>

<script>
const WORDS=[
  {ar:"الله",tl:"Алла́х",tr:"Бог"},{ar:"رب",tl:"Рабб",tr:"Господь"},{ar:"رحمة",tl:"ра́хма",tr:"милость"},{ar:"عذاب",tl:"аза́б",tr:"наказание"},
  {ar:"يوم",tl:"я́ум",tr:"день"},{ar:"أرض",tl:"ард",tr:"земля"},{ar:"سماء",tl:"са́ма'",tr:"небо"},{ar:"نور",tl:"ну́р",tr:"свет"},
  {ar:"ظلمات",tl:"зулю́мат",tr:"тьма"},{ar:"هدى",tl:"худа́",tr:"руководство"},{ar:"ضلال",tl:"даля́ль",tr:"заблуждение"},{ar:"كتاب",tl:"кита́б",tr:"книга"},
  {ar:"رسول",tl:"расу́ль",tr:"посланник"},{ar:"نبي",tl:"наби́",tr:"пророк"},{ar:"قوم",tl:"ка́ум",tr:"народ"},{ar:"أمة",tl:"у́мма",tr:"община"},
  {ar:"حق",tl:"хакк",tr:"истина"},{ar:"باطل",tl:"ба́тиль",tr:"ложь"},{ar:"علم",tl:"ильм",tr:"знание"},{ar:"جهل",tl:"джа́хль",tr:"невежество"},
  {ar:"صبر",tl:"сабр",tr:"терпение"},{ar:"شكر",tl:"шукр",tr:"благодарность"},{ar:"تقوى",tl:"таква́",tr:"богобоязненность"},{ar:"إيمان",tl:"и́ман",tr:"вера"},
  {ar:"كفر",tl:"куфр",tr:"неверие"},{ar:"عدل",tl:"адль",tr:"справедливость"},{ar:"ظلم",tl:"зульм",tr:"несправедливость"},{ar:"خير",tl:"хайр",tr:"благо"},
  {ar:"شر",tl:"шарр",tr:"зло"},{ar:"جنة",tl:"джа́нна",tr:"рай"},{ar:"نار",tl:"на́р",tr:"огонь"},{ar:"ماء",tl:"ма'",tr:"вода"},
  {ar:"طعام",tl:"та'а́м",tr:"пища"},{ar:"ثمر",tl:"са́мар",tr:"плоды"},{ar:"شجر",tl:"ша́джар",tr:"дерево"},{ar:"جبل",tl:"джа́баль",tr:"гора"},
  {ar:"بحر",tl:"бахр",tr:"море"},{ar:"شمس",tl:"шамс",tr:"солнце"},{ar:"قمر",tl:"ка́мар",tr:"луна"},{ar:"نجم",tl:"на́джм",tr:"звезда"},
  {ar:"ليل",tl:"ляйль",tr:"ночь"},{ar:"نهار",tl:"наха́р",tr:"день/свет"},{ar:"قلب",tl:"кальб",tr:"сердце"},{ar:"روح",tl:"ру́х",tr:"дух"},
  {ar:"نفس",tl:"нафс",tr:"душа/я"},{ar:"حياة",tl:"хая́т",tr:"жизнь"},{ar:"موت",tl:"маут",tr:"смерть"},{ar:"باب",tl:"баб",tr:"дверь"},{ar:"بيت",tl:"байт",tr:"дом"}
];

let state={queue:[],learned:0,flipped:false};
const KEY='arab_flashcards_v1';

function init(){
  const saved=localStorage.getItem(KEY);
  state=saved?JSON.parse(saved):{queue:WORDS.map((_,i)=>i),learned:0,flipped:false};
  updateUI();
}

function updateUI(){
  document.getElementById('learned').textContent=state.learned;
  document.getElementById('remaining').textContent=state.queue.length;
  document.getElementById('progress').style.width=`${(state.learned/WORDS.length)*100}%`;
  if(state.queue.length===0){
    document.getElementById('word').textContent='🎉';
    document.getElementById('hint').textContent='Все слова выучены! Нажми ↺ для сброса.';    document.getElementById('answer').style.display='none';
    document.getElementById('buttons').classList.remove('active');
    return;
  }
  const w=WORDS[state.queue[0]];
  document.getElementById('word').textContent=w.ar;
  document.getElementById('hint').textContent='Нажми, чтобы увидеть перевод';
  document.getElementById('translit').textContent=w.tl;
  document.getElementById('translation').textContent=w.tr;
  document.getElementById('answer').style.display='none';
  document.getElementById('buttons').classList.remove('active');
  state.flipped=false;
}

function flip(){
  if(state.flipped||state.queue.length===0)return;
  document.getElementById('hint').style.display='none';
  document.getElementById('answer').style.display='block';
  document.getElementById('buttons').classList.add('active');
  state.flipped=true;
}

function rate(known){
  const idx=state.queue.shift();
  if(known)state.learned++;
  else state.queue.push(idx);
  localStorage.setItem(KEY,JSON.stringify(state));
  updateUI();
}

function resetApp(){
  if(confirm('Сбросить прогресс? Все слова вернутся в очередь.')){
    localStorage.removeItem(KEY);
    init();
  }
}

window.addEventListener('DOMContentLoaded',init);
if('serviceWorker'in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
